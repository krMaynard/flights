<form class="search-form" method="post" action="{{ url_for('search') }}">
    <div class="trip-toggle">
        <label class="radio">
            <input type="radio" name="trip" value="one-way" {% if defaults.trip == 'one-way' %}checked{% endif %}>
            One-way
        </label>
        <label class="radio">
            <input type="radio" name="trip" value="round-trip" {% if defaults.trip == 'round-trip' %}checked{% endif %}>
            Round-trip
        </label>
    </div>

    <div class="grid">
        <label>
            <span>From</span>
            <input name="origin" placeholder="SFO" maxlength="3"
                   value="{{ defaults.origin }}" required autocomplete="off">
        </label>
        <label>
            <span>To</span>
            <input name="destination" placeholder="JFK" maxlength="3"
                   value="{{ defaults.destination }}" required autocomplete="off">
        </label>
        <label>
            <span>Depart</span>
            <input type="date" name="depart_date" value="{{ defaults.depart_date }}" required>
        </label>
        <label class="return-field">
            <span>Return</span>
            <input type="date" name="return_date" value="{{ defaults.return_date }}">
        </label>
    </div>

    <div class="grid grid-small">
        <label>
            <span>Adults</span>
            <input type="number" name="adults" value="{{ defaults.adults }}" min="1" max="9">
        </label>
        <label>
            <span>Children</span>
            <input type="number" name="children" value="{{ defaults.children }}" min="0" max="8">
        </label>
        <label>
            <span>Cabin</span>
            <select name="seat">
                {% for value, label in seat_choices %}
                    <option value="{{ value }}" {% if defaults.seat == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            <span>Max stops</span>
            <select name="max_stops">
                <option value="" {% if not defaults.max_stops %}selected{% endif %}>Any</option>
                <option value="0" {% if defaults.max_stops == '0' %}selected{% endif %}>Nonstop</option>
                <option value="1" {% if defaults.max_stops == '1' %}selected{% endif %}>≤ 1 stop</option>
                <option value="2" {% if defaults.max_stops == '2' %}selected{% endif %}>≤ 2 stops</option>
            </select>
        </label>
    </div>

    <button class="primary" type="submit">Search flights</button>
</form>
